org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

android.useAndroidX=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=true
hermesEnabled=true
edgeToEdgeEnabled=false

# Release signing → app/build.gradle (keystore in android/app/ or absolute path)
MYAPP_RELEASE_STORE_FILE=your-release.keystore
MYAPP_RELEASE_KEY_ALIAS=your-key-alias
MYAPP_RELEASE_STORE_PASSWORD=replace-me
MYAPP_RELEASE_KEY_PASSWORD=replace-me
